# Navigation - transparent style
nav:
  logo:
  display_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# Code Blocks
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_height_limit: false
code_word_wrap: true
highlight_shrink: false

# Social links
social:
  fab fa-github: https://github.com/ban-code-art || Github

# Avatar - anime style
avatar:
  img: https://img.001315.xyz/file/tg/1778406722917.webp
  effect: false

# Home page banner - full screen anime background
index_img: https://img.001315.xyz/file/tg/1778924977571.webp
index_site_info_top: 60%

# Subtitle typewriter effect
subtitle:
  enable: true
  effect: true
  loop: true
  source: false
  sub:
    - 学习与记录
    - 代码改变世界
    - 保持热爱，奔赴山海

# Default top image for post/page headers
default_top_img: https://img.001315.xyz/file/tg/1778924977571.webp

# Default cover for posts
default_cover:

# Cover settings
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  default_cover:

# Table of Contents (TOC)
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

# Post meta display
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# Post copyright
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Aside / Sidebar
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 保持热爱，奔赴山海
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/ban-code-art
  card_announcement:
    enable: true
    content: 欢迎来到 Rhine 的博客，这里记录着代码与生活的点滴
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# Footer
footer:
  owner:
    enable: true
    since: 2026
  custom_text:
  copyright: true

# Dark mode
darkmode:
  enable: true
  button: true
  autoChangeMode: false

# Reading mode
readmode: true

# Font settings
font:
  global-font-size:
  code-font-size:
  font-family: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Lato, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif'
  code-font-family: '"JetBrains Mono", Consolas, Monaco, "Courier New", monospace'

# Theme color - Blue-white anime style
theme_color:
  enable: true
  main: "#4c9bff"
  paginator: "#4c9bff"
  button_hover: "#6366f1"
  text_selection: "#a0d8ef"
  link_color: "#4c9bff"
  meta_color: "#858585"
  hr_color: "#a0d8ef"
  code_foreground: "#333333"
  code_background: "#f7f9fe"
  toc_color: "#4c9bff"
  blockquote_padding_color: "#4c9bff"
  blockquote_background_color: "#f7f9fe"
  scrollbar_color: "#4c9bff"
  meta_theme_color_light: "#ffffff"
  meta_theme_color_dark: "#1a1b2e"

# Background - fixed full-screen image
background: "url('https://img.001315.xyz/file/tg/1778924977571.webp') center center / cover no-repeat fixed"

# Footer background
footer_bg: true

# Preloader - loading animation
preloader:
  enable: true
  source: 1
  pace_css_url:

# Wordcount
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Local search
local_search:
  enable: true
  preload: false
  CDN:

# Image lazy load
lazyload:
  enable: true
  field: site
  placeholder:
  blur: false

# Lightbox
lightbox: fancybox

# Page transition
pjax:
  enable: true

# Inject custom head/bottom
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
    - <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    - <link rel="shortcut icon" type="image/svg+xml" href="/img/favicon.svg">
  bottom:
    - <script src="/js/custom.js"></script>

# CDN settings
CDN:
  third_party_provider: jsdelivr
  option:
