title: Rhine's Blog
subtitle: 学习与记录
description: 代码与思考的记录
keywords:
author: Rhine
language: zh-CN
timezone: Asia/Shanghai

url: https://ban-code-art.github.io
root: /
permalink: posts/:abbrlink/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

highlight:
  enable: false
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

prismjs:
  enable: false

index_generator:
  path: ''
  per_page: 10
  order_by: -date

default_category: uncategorized
category_map:
tag_map:

meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

per_page: 10
pagination_dir: page

theme: butterfly

deploy:
  type: git
  repo: https://github.com/ban-code-art/ban-code-art.github.io.git
  branch: main

search:
  path: search.xml
  field: post
  content: true
  format: html

# Live2D
live2d:
  enable: true
  scriptFrom: local
  pluginRootPath: live2dw/
  pluginJsPath: lib/
  pluginModelPath: assets/
  tagMode: false
  debug: false
  model:
    use: live2d-widget-model-tororo
  display:
    position: right
    width: 120
    height: 250
    hOffset: 0
    vOffset: -10
  mobile:
    show: true
  react:
    opacity: 0.85

# Abbrlink - 永久短链接
abbrlink:
  alg: crc32
  rep: hex

# Sitemap - 搜索引擎收录
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

# All Minifier - 压缩优化
all_minifier: true

# Blog Encrypt - 文章加密（在需要加密的文章 front-matter 中添加 password 字段即可）
# 示例：
# ---
# title: 私密文章
# password: your-password
# ---
encrypt:
  abstract: 本文已加密，请输入密码查看
  message: 请输入密码
  wrong_pass_message: 密码错误，请重试
  wrong_hash_message: 密码错误，请重试

# APlayer 音乐播放器
aplayer:
  meting: true
  asset_inject: false
