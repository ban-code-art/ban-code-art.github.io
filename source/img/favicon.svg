<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4eeff"/>
      <stop offset="100%" style="stop-color:#a8d8f0"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8d4f0"/>
      <stop offset="100%" style="stop-color:#f0c8d8"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#border)" stroke-width="3"/>
  <!-- Sky background -->
  <circle cx="32" cy="32" r="27" fill="url(#sky)"/>
  <!-- Clouds -->
  <ellipse cx="18" cy="28" rx="8" ry="4" fill="white" opacity="0.7"/>
  <ellipse cx="14" cy="30" rx="6" ry="3" fill="white" opacity="0.6"/>
  <ellipse cx="46" cy="24" rx="6" ry="3" fill="white" opacity="0.5"/>
  <!-- Book -->
  <path d="M18 42 L32 38 L46 42 L46 46 L32 43 L18 46 Z" fill="#4a7fbf"/>
  <path d="M32 38 L32 43" stroke="#3a6aaa" stroke-width="0.5"/>
  <path d="M18 42 L32 38 L46 42 L46 44 L32 41 L18 44 Z" fill="white" opacity="0.9"/>
  <!-- Page lines -->
  <line x1="24" y1="40.5" x2="30" y2="39.5" stroke="#b0c8e0" stroke-width="0.5"/>
  <line x1="24" y1="41.5" x2="29" y2="40.5" stroke="#b0c8e0" stroke-width="0.5"/>
  <line x1="34" y1="39.5" x2="42" y2="41" stroke="#b0c8e0" stroke-width="0.5"/>
  <line x1="34" y1="40.5" x2="41" y2="42" stroke="#b0c8e0" stroke-width="0.5"/>
  <!-- Feather quill -->
  <path d="M38 18 C40 22, 39 28, 34 36 C33.5 37, 33 37.5, 32.5 38" stroke="#4a7fbf" stroke-width="0.8" fill="none"/>
  <path d="M38 18 C36 20, 35 24, 34 30 C33.5 32, 33 34, 32.5 38" fill="white" opacity="0.95"/>
  <path d="M38 18 C40 20, 40 24, 38 28 C37 30, 35 34, 34 36 C33.5 37, 33 37.5, 32.5 38" fill="white" opacity="0.9"/>
  <path d="M38 18 C39 19, 39.5 20, 39 22" stroke="white" stroke-width="0.3" fill="none"/>
  <!-- Feather center line -->
  <path d="M38 18 C37 24, 35 30, 32.5 38" stroke="#6a9fd0" stroke-width="0.6" fill="none"/>
  <!-- Sparkles -->
  <circle cx="42" cy="20" r="1" fill="white" opacity="0.8"/>
  <circle cx="44" cy="18" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="22" cy="22" r="0.7" fill="white" opacity="0.7"/>
  <!-- Petals -->
  <ellipse cx="24" cy="24" rx="1.5" ry="0.8" fill="#f8c8d8" opacity="0.7" transform="rotate(-30 24 24)"/>
  <ellipse cx="44" cy="34" rx="1.2" ry="0.6" fill="#f8c8d8" opacity="0.6" transform="rotate(20 44 34)"/>
  <ellipse cx="20" cy="36" rx="1" ry="0.5" fill="#f8c8d8" opacity="0.5" transform="rotate(-15 20 36)"/>
</svg>
